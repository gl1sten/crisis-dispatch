<!DOCTYPE html>
<html>
<head>
  <title>Crisis Dispatch</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    #map {
      height: 500px;
      width: 90%;
      margin: auto;
      border-radius: 10px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .fire { background: red; color: white; }
    .medical { background: green; color: white; }
    .crime { background: blue; color: white; }

    #status {
      margin: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>🚨 Crisis Dispatch</h1>

<p id="status">📍 Getting your location...</p>

<button id="fireBtn" class="fire" onclick="sendSOS('fire')" disabled>🔥 Fire</button>
<button id="medicalBtn" class="medical" onclick="sendSOS('medical')" disabled>🚑 Medical</button>
<button id="crimeBtn" class="crime" onclick="sendSOS('crime')" disabled>🚓 Crime</button>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map;
let userPos;
let responderMarkers = {};
let incidentMarkers = {};

// Initialize map
function initMap(lat, lng) {
  map = L.map('map').setView([lat, lng], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // user marker
  L.marker([lat, lng]).addTo(map).bindPopup("You").openPopup();
}

// Get user location
navigator.geolocation.getCurrentPosition(
  pos => {
    userPos = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    };

    initMap(userPos.lat, userPos.lng);

    document.getElementById("status").innerText = "✅ Location ready";

    // enable buttons
    document.getElementById("fireBtn").disabled = false;
    document.getElementById("medicalBtn").disabled = false;
    document.getElementById("crimeBtn").disabled = false;
  },
  err => {
    document.getElementById("status").innerText = "❌ Location denied";
    alert("Please allow location");
    console.error(err);
  }
);

// Send SOS
function sendSOS(type) {
  fetch("/sos", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      type: type,
      lat: userPos.lat,
      lng: userPos.lng
    })
  });
}

// Update map
async function update() {
  const incidents = await fetch("/incidents").then(r => r.json());
  const responders = await fetch("/responders").then(r => r.json());

  // incidents (red)
  incidents.forEach(i => {
    if (!incidentMarkers[i.id]) {
      incidentMarkers[i.id] = L.marker([i.lat, i.lng], {
        icon: L.icon({
          iconUrl: "https://maps.google.com/mapfiles/ms/icons/red-dot.png",
          iconSize: [32, 32]
        })
      }).addTo(map);
    }
  });

  // responders
  responders.forEach(r => {
    const iconUrl = r.busy
      ? "https://maps.google.com/mapfiles/ms/icons/purple-dot.png"
      : "https://maps.google.com/mapfiles/ms/icons/blue-dot.png";

    if (!responderMarkers[r.id]) {
      responderMarkers[r.id] = L.marker([r.lat, r.lng], {
        icon: L.icon({ iconUrl: iconUrl, iconSize: [32, 32] })
      }).addTo(map);
    } else {
      responderMarkers[r.id].setLatLng([r.lat, r.lng]);
    }
  });
}

setInterval(update, 1000);
</script>

</body>
</html>
