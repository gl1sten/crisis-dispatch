<!DOCTYPE html>
<html>
<head>
  <title>Responder Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0d10;
      color: white;
      display: flex;
    }

    #map { width: 70%; height: 100vh; }

    #panel {
      width: 30%;
      padding: 20px;
      overflow-y: auto;
      background: #111;
    }

    .card {
      border: 1px solid #333;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
    }

    button {
      margin-top: 8px;
      margin-right: 6px;
      padding: 8px 12px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .accept { background: #00f294; color: black; }
    .deny { background: #ff3b3b; color: white; }
  </style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <h2>🚨 Incoming Requests</h2>
  <div id="requests"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;
let responderId = 1;

// responder start location
let responderLat = 28.6139;
let responderLng = 77.2090;

let responderMarker;
let incidentMarkers = {};
let path = [];
let step = 0;
let moving = false;

// ---------------- MAP ----------------
function initMap() {
  map = L.map('map').setView([responderLat, responderLng], 13);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);

  responderMarker = L.marker([responderLat, responderLng]).addTo(map)
    .bindPopup("Responder");
}

// ---------------- ROUTE ----------------
async function getRoute(start, end) {
  let res = await fetch(
    `https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${end.lng},${end.lat}?overview=full&geometries=geojson`
  );
  let data = await res.json();
  return data.routes[0];
}

// ---------------- MOVE ----------------
async function startMovement(targetLat, targetLng) {

  let route = await getRoute(
    { lat: responderLat, lng: responderLng },
    { lat: targetLat, lng: targetLng }
  );

  if (!route) return;

  path = route.geometry.coordinates.map(c => [c[1], c[0]]);
  step = 0;
  moving = true;

  // draw route
  L.polyline(path, { color: "#3b82f6", weight: 3 }).addTo(map);

  moveStep();
}

function moveStep() {
  if (!moving || step >= path.length) {
    moving = false;
    return;
  }

  let pos = path[step];
  responderMarker.setLatLng(pos);

  responderLat = pos[0];
  responderLng = pos[1];

  step++;

  setTimeout(moveStep, 200); // speed
}

// ---------------- LOAD INCIDENTS ----------------
async function loadIncidents() {
  let res = await fetch("/incidents");
  let data = await res.json();

  const container = document.getElementById("requests");
  container.innerHTML = "";

  data.forEach(i => {

    // show waiting
    if (i.status === "waiting") {

      if (!incidentMarkers[i.id]) {
        incidentMarkers[i.id] = L.marker([i.lat, i.lng])
          .addTo(map)
          .bindPopup("Incident");
      }

      let div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>${i.type.toUpperCase()}</b><br>
        <button class="accept" onclick="accept(${i.id}, ${i.lat}, ${i.lng})">Accept</button>
        <button class="deny" onclick="deny(${i.id})">Deny</button>
      `;

      container.appendChild(div);
    }
  });
}

// ---------------- ACTIONS ----------------
async function accept(id, lat, lng) {
  await fetch("/respond", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      incident_id: id,
      responder_id: responderId,
      action: "accept"
    })
  });

  startMovement(lat, lng); // 🔥 START MOVEMENT
}

async function deny(id) {
  await fetch("/respond", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      incident_id: id,
      responder_id: responderId,
      action: "deny"
    })
  });
}

// ---------------- LOOP ----------------
setInterval(loadIncidents, 3000);

initMap();
loadIncidents();
</script>

</body>
</html>
